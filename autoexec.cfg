// ============================================================
//  autoexec.cfg — entry point only.
//  All actual settings live under cfg/<module>/ and Addons/.
//  This file wires aliases and decides load order. Edit values
//  in cfg/, not here.
// ============================================================

// ---- Load order ----
exec cfg/misc/guide
exec cfg/core/AutoSettings
exec cfg/hud/HUDOn
exec cfg/viewmodel/VMOn
exec cfg/graphics/ExcellentGraphics
//exec cfg/graphics/BadGraphics
exec Addons/AddonsConfigApplier.cfg

// ---- Aliases: movement ----
alias WheelBhopOn "exec cfg/movement/MwheelBhopOn"
alias WheelBhopOff "exec cfg/movement/MwheelBhopOff"
alias ReloadOnWheel "exec cfg/movement/MwheelMCycling"

// ---- Aliases: HUD ----
alias HUDOn "exec cfg/hud/HUDOn; bind F1 HUDOff"
alias HUDOff "exec cfg/hud/HUDOff; bind F1 HUDOn"

// ---- Aliases: display / controller quick-access ----
// Kept as short aliases (not full paths) since these are meant to be
// typed in console on the fly.
alias Res1080 "exec cfg/display/1080"
alias Res1440 "exec cfg/display/1440"
alias Controller360On "exec cfg/controller/360controller"
alias Controller360Off "exec cfg/controller/undo360controller"

// ---- Binds ----
bind "x" "wos_uap freestyle_3"
bind "RCTRL" "exec autoexec"
bind "w" "+forward"
bind "s" "+back"
bind "a" "+moveleft"
bind "d" "+moveright"
bind "CTRL" "+duck"
bind "ALT" "+walk"
bind "SHIFT" "+speed"
bind "SPACE" "+jump"
bind "v" "noclip"
bind "e" "+use"
bind "r" "+reload"
bind "t" "impulse 201"
bind "y" "messagemode"
bind "u" "messagemode2"
bind "f" "impulse 100"
bind "k" "kill"
bind "b" "+zoom"
bind "z" "+voicerecord"
bind "'" "+menu_context"
bind "," "undo"
bind "TAB" "+menu"
bind "ESCAPE" "cancelselect"
bind "PAUSE" "pause"
bind "F1" "HUDOff"
bind "F2" "gm_showhelp"
bind "F3" "gm_showteam"
bind "F4" "gm_showspare1"
bind "F5" "gm_showspare2"
bind "F6" "jpeg"

// ---- Binds: addon-specific ----
bind "MOUSE5" "+grenade1"
echo "MOUSE5 +grenade1"

bind "g" "egp_armorplate"
echo "g - egp_armorplate"

bind "q" "xdkorm_mwstim_use"
echo "q - xdkorm_mwstim_use"

// ---- Overwrites ----
mat_antialias "0"
echo "mat_antialias '0'"

echo "autoexec.cfg loaded"
