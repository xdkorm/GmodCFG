// Viewmodel ON — kept out of BadGraphics/ExcellentGraphics on purpose,
// so switching graphics presets never touches whether you can see your
// weapon. Toggle independently with the "v"-bound VMToggle alias (bind
// it yourself, "v" is already used for noclip in autoexec.cfg).
r_drawviewmodel "1"
viewmodel_fov "68"
alias "VMToggle" "exec cfg/viewmodel/VMOff"
